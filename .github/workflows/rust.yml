name: Modulr Agent Build & Test (Multi-Arch)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/modulrcloud/modulr-agent

jobs:
  # Build and push Cross Docker images to GHCR (only when dockerfiles change)
  build-cross-images:
    name: Build Cross Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            dockerfile: .cross/x86_64-unknown-linux-gnu.dockerfile
          - target: aarch64-unknown-linux-gnu
            dockerfile: .cross/aarch64-unknown-linux-gnu.dockerfile
          - target: armv7-unknown-linux-gnueabihf
            dockerfile: .cross/armv7-unknown-linux-gnueabihf.dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}/cross-${{ matrix.target }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}

  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    needs: build-cross-images
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/modulrcloud/modulr-agent/cross-x86_64-unknown-linux-gnu:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-lint-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-lint-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            cargo-target-lint-${{ hashFiles('**/Cargo.lock') }}-
            cargo-target-lint-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

  cross-build:
    name: Cross-Build Targets
    runs-on: ubuntu-latest
    needs: build-cross-images
    permissions:
      contents: read
      packages: read
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache Cargo registry & git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-${{ matrix.target }}-

      - name: Cache Cargo bin (for cross)
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-cross-${{ runner.os }}

      - name: Cache Cross target directory
        uses: actions/cache@v4
        with:
          path: target
          key: cross-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            cross-target-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}-
            cross-target-${{ matrix.target }}-

      - name: Install Cross
        run: |
          if ! command -v cross &> /dev/null; then
            cargo install cross --locked
          fi

      - name: Configure Cross to use GHCR images
        run: |
          REPO_LOWER=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          cat > Cross.toml << EOF
          [build]
          default-target = "x86_64-unknown-linux-gnu"

          [target.x86_64-unknown-linux-gnu]
          image = "ghcr.io/${REPO_LOWER}/cross-x86_64-unknown-linux-gnu:latest"

          [target.aarch64-unknown-linux-gnu]
          image = "ghcr.io/${REPO_LOWER}/cross-aarch64-unknown-linux-gnu:latest"

          [target.armv7-unknown-linux-gnueabihf]
          image = "ghcr.io/${REPO_LOWER}/cross-armv7-unknown-linux-gnueabihf:latest"
          EOF

      - name: Build with Cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: modulr-agent-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/modulr_agent

  package-deb:
    name: Package .deb
    runs-on: ubuntu-latest
    needs: cross-build
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: modulr-agent-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/

      - name: Make binary executable
        run: chmod +x target/${{ matrix.target }}/release/modulr_agent

      - name: Build .deb package
        run: cargo deb -p modulr_agent --no-build --target ${{ matrix.target }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: modulr-agent-deb-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb

  build-runtime-images:
    name: Build Runtime Docker Images
    runs-on: ubuntu-latest
    needs: cross-build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download x86_64 binary
        uses: actions/download-artifact@v4
        with:
          name: modulr-agent-x86_64-unknown-linux-gnu
          path: docker-context/linux/amd64/

      - name: Download aarch64 binary
        uses: actions/download-artifact@v4
        with:
          name: modulr-agent-aarch64-unknown-linux-gnu
          path: docker-context/linux/arm64/

      - name: Download armv7 binary
        uses: actions/download-artifact@v4
        with:
          name: modulr-agent-armv7-unknown-linux-gnueabihf
          path: docker-context/linux/arm/v7/

      - name: Make binaries executable
        run: |
          chmod +x docker-context/linux/amd64/modulr_agent
          chmod +x docker-context/linux/arm64/modulr_agent
          chmod +x docker-context/linux/arm/v7/modulr_agent

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/modulrcloud/modulr-agent
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=runtime
          cache-to: type=gha,mode=max,scope=runtime

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [package-deb, build-runtime-images]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download .deb artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: modulr-agent-deb-*
          merge-multiple: true
          path: debs/

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: modulr-agent-x86_64*
          path: binaries/x86_64/

      - name: Download binary artifacts (aarch64)
        uses: actions/download-artifact@v4
        with:
          pattern: modulr-agent-aarch64*
          path: binaries/aarch64/

      - name: Download binary artifacts (armv7)
        uses: actions/download-artifact@v4
        with:
          pattern: modulr-agent-armv7*
          path: binaries/armv7/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            debs/*.deb
